<!DOCTYPE html>

<head>

    <title>Quiz: Matemática Discreta Completo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; color: #333; padding: 15px; box-sizing: border-box; }

        .options-container { display: flex; flex-direction: column; gap: 10px; }

        .option-btn:disabled { cursor: not-allowed; opacity: 0.9; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .feedback-container { margin-top: 20px; padding: 15px; border-radius: 8px; background-color: #e2e3e5; display: none; line-height: 1.5; font-size: 15px; }
        .nav-btn { margin-top: 20px; padding: 14px 20px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; display: none; font-weight: bold; }

        #score-container { text-align: center; display: none; }
        #score-container h2 { color: #28a745; margin-bottom: 10px; }
        #score-container p { font-size: 18px; }

</head>

        document.getElementById("question-text").innerHTML = q.question;
        
        var optionsContainer = document.getElementById("options");
        optionsContainer.innerHTML = "";
        
        for (var i = 0; i < q.options.length; i++) {
            (function(index) {
                var btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = q.options[index];
                btn.onclick = function() { checkAnswer(index, btn); };
                optionsContainer.appendChild(btn);
            })(i);
        }

        document.getElementById("feedback").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
    }

    function checkAnswer(selectedIndex, btn) {
        var q = questions[currentQuestionIndex];
        var buttons = document.querySelectorAll(".option-btn");
        
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].disabled = true;
        }

        var feedbackBox = document.getElementById("feedback");
        feedbackBox.style.display = "block";

        if (selectedIndex === q.answer) {
            btn.classList.add("correct");
            score++;
            feedbackBox.innerHTML = "<strong>Resposta Correta! 🎉</strong><br><br>" + q.explanation;
            feedbackBox.style.backgroundColor = "#d4edda";
            feedbackBox.style.color = "#155724";
        } else {
            btn.classList.add("wrong");
            buttons[q.answer].classList.add("correct");
            feedbackBox.innerHTML = "<strong>Resposta Incorreta! ❌</strong><br><br>" + q.explanation;
            feedbackBox.style.backgroundColor = "#f8d7da";
            feedbackBox.style.color = "#721c24";
        }

        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            window.scrollTo(0, 0);
            loadQuestion();
        } else {
            showScore();
        }
    }

    function showScore() {
        document.getElementById("quiz-area").style.display = "none";
        var scoreContainer = document.getElementById("score-container");
        scoreContainer.style.display = "block";
        document.getElementById("score").innerText = score;
        document.getElementById("total").innerText = questions.length;
    }

    // Inicializar
    window.onload = function() {
        loadQuestion();
    };
</script>

</body>
</html>
